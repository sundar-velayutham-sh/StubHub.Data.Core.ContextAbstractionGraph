conformance:
  workflow_id: create-etl-pipeline

  steps:
    setup_environment:
      type: ReasonRequest
      persona: data_engineer
      knowledge_includes:
        - snowflake_environment
      tools_include:
        - snowflake_mcp.execute_query
        - github_cli.read_file
      has_instruction: true

    classify_intent:
      type: ReasonRequest
      persona: data_engineer
      knowledge_includes:
        - naming_conventions
      tools_count: 0
      has_instruction: true

    discover_source_schema:
      type: ReasonRequest
      persona: data_engineer
      knowledge_includes:
        - snowflake_environment
      tools_include:
        - snowflake_mcp.execute_query
        - snowflake_mcp.describe_table
      dynamic_refs_from:
        - classify_intent
      has_instruction: true

    trace_reference_pipeline:
      type: ReasonRequest
      persona: data_engineer
      knowledge_includes:
        - snowflake_environment
      tools_include:
        - snowflake_mcp.execute_query
      dynamic_refs_from:
        - classify_intent
      has_instruction: true

    parse_sql_sources:
      type: ReasonRequest
      persona: data_engineer
      knowledge_includes:
        - snowflake_environment
        - dbt_project_structure
      tools_include:
        - snowflake_mcp.execute_query
        - snowflake_mcp.describe_table
      dynamic_refs_from:
        - classify_intent
      has_instruction: true

    analyze_target_pipeline:
      type: ReasonRequest
      persona: data_engineer
      knowledge_includes:
        - snowflake_environment
      tools_include:
        - snowflake_mcp.execute_query
        - github_cli.read_file
      dynamic_refs_from:
        - setup_environment
        - classify_intent
      has_instruction: true

    profile_source_data:
      type: ReasonRequest
      persona: data_engineer
      tools_include:
        - snowflake_mcp.execute_query
      has_instruction: true

    gather_reference_context:
      type: ReasonRequest
      persona: data_engineer
      tools_include:
        - github_cli.read_file
        - github_cli.search_code
        - snowflake_mcp.execute_query
      dynamic_refs_from:
        - setup_environment
        - classify_intent
      has_instruction: true

    build_pipeline:
      type: ReasonRequest
      persona: data_engineer
      knowledge_includes:
        - naming_conventions
        - testing_standards
        - load_frequency_heuristics
        - dbt_project_structure
      tools_include:
        - snowflake_mcp.execute_query
        - github_cli.read_file
        - dbt_mcp.compile
        - dbt_mcp.show
        - dbt_mcp.get_lineage
      dynamic_refs_from:
        - classify_intent
        - profile_source_data
        - gather_reference_context
      has_instruction: true

    validate_output:
      type: ReasonRequest
      persona: data_engineer
      tools_include:
        - snowflake_mcp.execute_query
        - dbt_mcp.compile
        - dbt_mcp.parse
        - dbt_mcp.show
        - dbt_mcp.test
        - dbt_mcp.get_lineage
      dynamic_refs_from:
        - build_pipeline
        - profile_source_data
        - gather_reference_context
      has_instruction: true

    show_results:
      type: DelegateRequest
      requires_approval: true

    revise_pipeline:
      type: ReasonRequest
      persona: data_engineer
      knowledge_includes:
        - naming_conventions
        - testing_standards
      tools_include:
        - snowflake_mcp.execute_query
        - github_cli.read_file
      dynamic_refs_from:
        - show_results
        - build_pipeline
        - validate_output
        - gather_reference_context
      has_instruction: true

    create_pr:
      type: DelegateRequest
      requires_approval: true

    recommend_orchestration:
      type: ReasonRequest
      persona: data_engineer
      tools_include:
        - snowflake_mcp.execute_query
      dynamic_refs_from:
        - build_pipeline
      has_instruction: true
