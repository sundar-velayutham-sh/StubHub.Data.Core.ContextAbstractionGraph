workflows:
  - id: add-column-to-model
    name: Add Column to Existing dbt Model
    persona: analytics_engineer
    triggers:
      keywords: [add column, new column, include field, add field]
      input_pattern: "{column} to {model}"

  - id: table-optimizer
    name: Optimize Snowflake Table Performance
    persona: data_engineer
    triggers:
      keywords: [optimize table, clustering, table performance, slow queries, partition]
      input_pattern: "optimize {table}"

  - id: generate-schema-yml
    name: Generate schema.yml for dbt Model
    persona: analytics_engineer
    triggers:
      keywords: [generate schema, add documentation, document model, schema yml]
      input_pattern: "generate schema for {model}"

  - id: add-dbt-tests
    name: Add dbt Tests to Existing Model
    persona: analytics_engineer
    triggers:
      keywords: [add tests, dbt tests, test coverage, add test, improve tests]
      input_pattern: "add tests to {model}"

  - id: thread-field-through-pipeline
    name: Thread Field Through dbt Pipeline
    persona: analytics_engineer
    triggers:
      keywords: [thread column, add field through pipeline, propagate column, thread field]
      input_pattern: "{column} through {model} pipeline"

  - id: configure-ingestion-pipeline
    name: Configure Data Ingestion Pipeline
    persona: data_engineer
    triggers:
      keywords: [add ingestion, configure pipeline, new data source, ingest table, add source ingestion]
      input_pattern: "ingest {table} from {source}"

  - id: fix-model-bug
    name: Fix Bug in dbt Model
    persona: analytics_engineer
    triggers:
      keywords: [fix bug, fix error, model failing, debug model, fix cast, fix join]
      input_pattern: "fix {model}"

  - id: create-staging-model
    name: Create Staging Model for Source Table
    persona: analytics_engineer
    triggers:
      keywords: [create staging model, new source, add source table, scaffold model, new staging]
      input_pattern: "create staging for {table}"
