workflow:
  id: create-etl-pipeline
  name: Create ETL Pipeline
  persona: data_engineer

  inputs:
    request_text:
      type: string
      required: true
    sql_text:
      type: string
      required: false
    reference_model:
      type: string
      required: false
    channel_id:
      type: string
      required: false
    thread_ts:
      type: string
      required: false

  steps:
    # ═══════════════════════════════════════════════════════════
    # PHASE 1: Context Assembly (DCAG orchestrates)
    # Gather everything the LLM needs to freestyle intelligently.
    # ═══════════════════════════════════════════════════════════

    # Step 0: Validate tool availability
    - id: setup_environment
      mode: reason
      instruction: |
        Verify that the required tools are available for this workflow.
        Test Snowflake connectivity by running a simple query.
        Test GitHub CLI by attempting to list files.
        Report which tools are available so downstream steps can use
        degraded mode if GitHub is unavailable.
      tools:
        - name: snowflake_mcp.execute_query
          instruction: "Test connectivity with SELECT 1"
        - name: github_cli.read_file
          instruction: "Test connectivity by reading a known file"
      context:
        static: [snowflake_environment]
        dynamic: []
      output_schema:
        type: object
        required: [snowflake_available, github_available]
        properties:
          snowflake_available:
            type: boolean
          github_available:
            type: boolean
      budget:
        max_llm_turns: 3
        max_tokens: 4000

    # Step 1: Classify intent to route discovery
    - id: classify_intent
      mode: reason
      instruction: |
        Parse the user's request to determine which discovery path to take.

        ENTRY POINTS:
        - new_source: User names a specific source table to build a pipeline for.
          Example: "Build a pipeline for fivetran_database.tiktok_ads.campaign_report"
        - similar_to: User references an existing model and wants something like it.
          Example: "Build something like campaign_day_agg but for affiliate traffic"
        - sql_to_pipeline: User provides raw SQL (in sql_text input or pasted in request).
          Example: "Make this a proper pipeline: SELECT ... FROM ..."
        - extend_existing: User wants to add a source/channel to an existing pipeline.
          Example: "Add TikTok as a new channel to marketing_spend"

        Extract:
        - source_hints: table names, system names, or identifiers mentioned
        - reference_model_hint: model name if similar_to or extend_existing
        - domain_hint: business domain (acquisition, core, pricing, cx, etc.)
        - sql_text: pass through if provided in input
      tools: []
      context:
        static: [naming_conventions]
        dynamic: []
      output_schema:
        type: object
        required: [entry_point, source_hints, domain_hint]
        properties:
          entry_point:
            type: string
            enum: [new_source, similar_to, sql_to_pipeline, extend_existing]
          source_hints:
            type: array
            items:
              type: string
          reference_model_hint:
            type: string
          domain_hint:
            type: string
          sql_text:
            type: string
      budget:
        max_llm_turns: 2
        max_tokens: 4000
      transitions:
        - when: "output.entry_point == 'new_source'"
          goto: discover_source_schema
        - when: "output.entry_point == 'similar_to'"
          goto: trace_reference_pipeline
        - when: "output.entry_point == 'sql_to_pipeline'"
          goto: parse_sql_sources
        - when: "output.entry_point == 'extend_existing'"
          goto: analyze_target_pipeline

    # Step 2a: Discover source schema (for new_source)
    - id: discover_source_schema
      mode: reason
      instruction: |
        Discover the source table(s) mentioned in the user's request.

        1. Query INFORMATION_SCHEMA.COLUMNS for full column metadata
        2. Query DW.DATAOPS_DBT.DBT_MODELS to check if staging models exist
        3. Query DW.DATAOPS_DBT.DBT_MODEL_TABLE_LINEAGE for similar pipelines
        4. Check for the SAME source in other brands/schemas
           (e.g., APPLE_SEARCH_ADS and APPLE_SEARCH_ADS_VIAGOGO)
        5. Query DW.DATAOPS_DBT.DBT_MODELS for naming/materialization conventions
      tools:
        - name: snowflake_mcp.execute_query
          instruction: "Query INFORMATION_SCHEMA, DBT_MODELS, and DBT_MODEL_TABLE_LINEAGE"
        - name: snowflake_mcp.describe_table
          instruction: "Get detailed column metadata for the source table"
      context:
        static: [snowflake_environment]
        dynamic:
          - from: classify_intent
            select: [source_hints, domain_hint]
      output_schema:
        type: object
        required: [source_tables, existing_models, similar_pipelines, conventions]
        properties:
          source_tables:
            type: array
            items:
              type: object
              required: [table_fqn, columns]
          existing_models:
            type: array
          similar_pipelines:
            type: array
          conventions:
            type: object
      budget:
        max_llm_turns: 6
        max_tokens: 10000
      transitions:
        - default: profile_source_data

    # Step 2b: Trace reference pipeline lineage (for similar_to)
    - id: trace_reference_pipeline
      mode: reason
      instruction: |
        Trace the full lineage of the reference model the user wants to replicate.

        1. Find the reference model in DBT_MODELS (unique_id, schema, materialization,
           depends_on_nodes, original_path)
        2. Trace FULL recursive lineage via DBT_MODEL_TABLE_LINEAGE
        3. For each model in the lineage, get: materialization, tags, depends_on_nodes
        4. Get test patterns from DBT_TESTS for models in the lineage
        5. Identify the new source the user wants (from source_hints)
        6. Check if the new source exists for multiple brands/schemas
      tools:
        - name: snowflake_mcp.execute_query
          instruction: "Query DBT_MODELS, DBT_MODEL_TABLE_LINEAGE, and DBT_TESTS"
      context:
        static: [snowflake_environment]
        dynamic:
          - from: classify_intent
            select: [reference_model_hint, source_hints, domain_hint]
      output_schema:
        type: object
        required: [source_tables, existing_models, similar_pipelines, conventions]
        properties:
          source_tables:
            type: array
            items:
              type: object
              required: [table_fqn, columns]
          existing_models:
            type: array
          similar_pipelines:
            type: array
          conventions:
            type: object
      budget:
        max_llm_turns: 6
        max_tokens: 10000
      transitions:
        - default: profile_source_data

    # Step 2c: Parse SQL to identify sources (for sql_to_pipeline)
    - id: parse_sql_sources
      mode: reason
      instruction: |
        Parse the user's SQL to identify source tables and existing dbt models.

        1. Extract all FROM and JOIN table references from the SQL
        2. For each referenced table, check if a dbt model exists in DBT_MODELS
        3. For tables without dbt models, query INFORMATION_SCHEMA for their schema
        4. Identify CTE structure — these hint at natural layer boundaries
        5. Flag hardcoded dates, missing filters, or other issues to address
        6. Check domain conventions for existing models
      tools:
        - name: snowflake_mcp.execute_query
          instruction: "Query DBT_MODELS and INFORMATION_SCHEMA"
        - name: snowflake_mcp.describe_table
          instruction: "Describe tables that don't have dbt models yet"
      context:
        static: [snowflake_environment, dbt_project_structure]
        dynamic:
          - from: classify_intent
            select: [sql_text, source_hints, domain_hint]
      output_schema:
        type: object
        required: [source_tables, existing_models, similar_pipelines, conventions]
        properties:
          source_tables:
            type: array
            items:
              type: object
              required: [table_fqn, columns]
          existing_models:
            type: array
          similar_pipelines:
            type: array
          conventions:
            type: object
      budget:
        max_llm_turns: 6
        max_tokens: 10000
      transitions:
        - default: profile_source_data

    # Step 2d: Analyze target pipeline (for extend_existing)
    - id: analyze_target_pipeline
      mode: reason
      instruction: |
        Analyze the existing pipeline the user wants to extend.

        1. Find the target model in DBT_MODELS
        2. Read the target model's SQL from GitHub to understand its structure
           (UNION ALL blocks, CTEs, JOIN patterns)
           DEGRADED MODE: If GitHub unavailable, use compiled_code from
           DBT_RUN_RESULTS instead
        3. Trace its lineage via DBT_MODEL_TABLE_LINEAGE
        4. Get test patterns from DBT_TESTS
        5. Identify where the new source fits in the existing structure
        6. Check if the new source exists for multiple brands
      tools:
        - name: snowflake_mcp.execute_query
          instruction: "Query DBT_MODELS, DBT_MODEL_TABLE_LINEAGE, DBT_TESTS, DBT_RUN_RESULTS"
        - name: github_cli.read_file
          instruction: "Read the target model SQL from the Astronomer repo"
      context:
        static: [snowflake_environment]
        dynamic:
          - from: setup_environment
            select: github_available
          - from: classify_intent
            select: [reference_model_hint, source_hints, domain_hint]
      output_schema:
        type: object
        required: [source_tables, existing_models, similar_pipelines, conventions]
        properties:
          source_tables:
            type: array
            items:
              type: object
              required: [table_fqn, columns]
          existing_models:
            type: array
          similar_pipelines:
            type: array
          conventions:
            type: object
      budget:
        max_llm_turns: 6
        max_tokens: 10000
      transitions:
        - default: profile_source_data

    # Step 3: Profile source data (MANDATORY — always runs)
    - id: profile_source_data
      mode: reason
      instruction: |
        Profile EVERY source table identified in discovery. This step is
        mandatory — it ensures we have hard data before any design decisions.

        For each source table, run these 6 checks:
        1. SHAPE: row count, column count, date range (MIN/MAX of date columns)
        2. PK CANDIDATES: for *_id and *_key columns, check cardinality vs row count
        3. NULL RATES: per column, flag any with >5% nulls
        4. DAILY VOLUME: rows per day over last 7 days (determines materialization)
        5. FRESHNESS: hours since last data (MAX of timestamp/synced columns)
        6. DUPLICATES: check candidate PKs for dupes

        Also check: does this source exist in MULTIPLE schemas/brands?
        (e.g., APPLE_SEARCH_ADS and APPLE_SEARCH_ADS_VIAGOGO)
        If yes, include ALL brand variants in the profile.

        Generate warnings for: stale sources (>48h), high nulls (>5%),
        no PK candidate, duplicates, low volume (<100 rows/day).
      tools:
        - name: snowflake_mcp.execute_query
          instruction: "Run profiling queries against each source table"
      context:
        static: []
        dynamic:
          - from: discover_source_schema
            select: source_tables
          - from: trace_reference_pipeline
            select: source_tables
          - from: parse_sql_sources
            select: source_tables
          - from: analyze_target_pipeline
            select: source_tables
      output_schema:
        type: object
        required: [profiles, warnings, multi_brand_sources]
        properties:
          profiles:
            type: array
            items:
              type: object
              required: [table_fqn, row_count, date_range, daily_avg_rows, freshness_hours, pk_candidate, null_flags]
          warnings:
            type: array
            items:
              type: object
              required: [table_fqn, warning_type, detail]
          multi_brand_sources:
            type: array
            items:
              type: object
              properties:
                base_source:
                  type: string
                brand_variants:
                  type: array
      budget:
        max_llm_turns: 8
        max_tokens: 12000
      transitions:
        - default: gather_reference_context

    # Step 4: Read real SQL from the repo as context (not templates)
    - id: gather_reference_context
      mode: reason
      instruction: |
        Read REAL SQL from the Astronomer repo to provide as context for
        the freestyle generation step. The goal is NOT to create templates —
        it's to show the LLM what good pipelines look like in this codebase.

        1. Identify the best reference pipeline (explicit from user, or
           best match from same domain found in discovery)
        2. For each model in the reference pipeline's lineage:
           - Read the raw model SQL from GitHub (Jinja, ref(), config block)
           - Read its schema.yml (tests, descriptions, meta)
           DEGRADED MODE: If GitHub unavailable, query DBT_RUN_RESULTS
           for compiled_code instead
        3. If no explicit reference: find 2-3 models in the same domain,
           read their SQL to show coding patterns
        4. Extract and note: config blocks, CTE naming, column conventions,
           test patterns, materialization choices, tag conventions

        This context will be provided to the build step so it can follow
        real patterns, not invented ones.
      tools:
        - name: github_cli.read_file
          instruction: "Read model SQL and schema.yml files from the Astronomer repo"
        - name: github_cli.search_code
          instruction: "Search for patterns in the domain directory"
        - name: snowflake_mcp.execute_query
          instruction: "DEGRADED MODE: Get compiled_code from DBT_RUN_RESULTS if GitHub unavailable"
      context:
        static: []
        dynamic:
          - from: setup_environment
            select: github_available
          - from: classify_intent
            select: [entry_point, reference_model_hint, domain_hint]
          - from: discover_source_schema
            select: [similar_pipelines, conventions]
          - from: trace_reference_pipeline
            select: [similar_pipelines, conventions]
          - from: parse_sql_sources
            select: [similar_pipelines, conventions]
          - from: analyze_target_pipeline
            select: [similar_pipelines, conventions]
      output_schema:
        type: object
        required: [reference_sql_files, domain_conventions]
        properties:
          reference_sql_files:
            type: array
            items:
              type: object
              required: [model_name, layer, raw_sql, original_path]
              properties:
                model_name:
                  type: string
                layer:
                  type: string
                raw_sql:
                  type: string
                compiled_sql:
                  type: string
                config_block:
                  type: string
                schema_yml:
                  type: string
                tests:
                  type: array
                original_path:
                  type: string
          domain_conventions:
            type: object
            properties:
              common_config_blocks:
                type: array
              naming_pattern:
                type: string
              typical_materialization:
                type: string
              directory_structure:
                type: string
      budget:
        max_llm_turns: 8
        max_tokens: 15000
      transitions:
        - default: build_pipeline

    # ═══════════════════════════════════════════════════════════
    # PHASE 2: Freestyle Generation (LLM reasons holistically)
    # One step. All context. Full creative freedom.
    # ═══════════════════════════════════════════════════════════

    # Step 5: Build the complete pipeline — architecture + SQL + tests
    - id: build_pipeline
      mode: reason
      instruction: |
        You have FULL CONTEXT about:
        - The source data (profiling results, column metadata, multi-brand variants)
        - The reference pipeline (real SQL from the repo, test patterns, conventions)
        - The domain conventions (naming, materialization, config blocks, directory structure)
        - The user's request and intent

        NOW: Design and build a complete ETL pipeline. You decide the architecture,
        the number of layers, the materializations, and the SQL. Use your judgment.
        Look at the reference SQL and follow its patterns, but improve where needed.

        PRODUCE ALL OF THESE ARTIFACTS:

        1. PIPELINE DESIGN — explain your architecture choices:
           - Pattern chosen and why (hourly_rollup, multi_source_union, cdc_staging, etc.)
           - Layers and models (name, materialization, purpose)
           - What already exists vs what's new vs what's modified

        2. MODEL SQL FILES — for each model:
           - Complete SQL with Jinja ({{ config() }}, {{ ref() }}, {{ source() }})
           - Config block matching domain conventions from reference examples
           - Labeled CTE blocks for readability ([SOURCE], [RENAME], [ENRICH], [FINAL])
           - If source exists for multiple brands: UNION them in staging
           - If source has columns needing rename/cast/coerce: create a staging layer
           - If the request is extend_existing: output the COMPLETE modified file, not a diff
           - Add derived metrics where they add business value (efficiency ratios, rates)
           - Skip deprecated or irrelevant columns (explain why in comments)

        3. SCHEMA.YML — for each model:
           - Column descriptions (infer from names + reference descriptions)
           - Primary key marked in meta
           - Tests: unique + not_null on PK at minimum
           - Additional tests based on column types and reference patterns
           - Business-relevant tests (spend bounds, row count checks) from reference

        4. SOURCES.YML — for new sources:
           - Database, schema, table identifier
           - loaded_at_field from profiling
           - Freshness thresholds (warn/error) matching domain conventions

        5. DAG RECOMMENDATION:
           - Which existing DAG these models belong in
           - Tags to set in config block
           - Whether a new DAG is needed (rare)

        QUALITY STANDARDS:
        - Follow the reference SQL patterns exactly for config blocks, Jinja macros, warehouse selection
        - Use {{ ref() }} and {{ source() }} everywhere — never hardcoded table names
        - Explicit column lists (no SELECT *)
        - COALESCE nulls on numeric columns where the reference does
        - If the user's SQL has hardcoded dates, replace with incremental logic
        - If profiling found issues (high nulls, duplicates), handle them in staging
      tools:
        - name: snowflake_mcp.execute_query
          instruction: "Query Snowflake if you need additional metadata during generation"
        - name: github_cli.read_file
          instruction: "Read additional files from the repo if needed"
        - name: dbt_mcp.compile
          instruction: "Compile a dbt model to validate SQL + Jinja syntax without executing"
        - name: dbt_mcp.show
          instruction: "Preview output rows for a model to verify it produces expected data"
        - name: dbt_mcp.get_lineage
          instruction: "Verify the new models integrate correctly into existing lineage"
      context:
        static: [naming_conventions, testing_standards, load_frequency_heuristics, dbt_project_structure]
        dynamic:
          - from: classify_intent
          - from: profile_source_data
          - from: gather_reference_context
          - from: discover_source_schema
            select: [source_tables, existing_models, conventions]
          - from: trace_reference_pipeline
            select: [source_tables, existing_models, conventions]
          - from: parse_sql_sources
            select: [source_tables, existing_models, conventions]
          - from: analyze_target_pipeline
            select: [source_tables, existing_models, conventions]
      output_schema:
        type: object
        required: [design, models, dag_recommendation]
        properties:
          design:
            type: object
            required: [pattern, rationale, layers]
            properties:
              pattern:
                type: string
              rationale:
                type: string
              layers:
                type: array
          models:
            type: array
            items:
              type: object
              required: [name, layer, materialization, sql_content, schema_yml_content, file_path]
              properties:
                name:
                  type: string
                layer:
                  type: string
                materialization:
                  type: string
                sql_content:
                  type: string
                schema_yml_content:
                  type: string
                sources_yml_content:
                  type: string
                file_path:
                  type: string
                schema_yml_path:
                  type: string
                is_new:
                  type: boolean
                is_modification:
                  type: boolean
          dag_recommendation:
            type: object
            properties:
              existing_dag:
                type: string
              tags:
                type: array
              schedule:
                type: string
              needs_new_dag:
                type: boolean
      budget:
        max_llm_turns: 10
        max_tokens: 25000

    # ═══════════════════════════════════════════════════════════
    # PHASE 3: Validation (DCAG enforces quality gates)
    # Check that the freestyle output meets mandatory requirements.
    # ═══════════════════════════════════════════════════════════

    # Step 6: Validate output against mandatory checklist
    - id: validate_output
      mode: reason
      instruction: |
        Validate the generated pipeline against mandatory quality requirements.
        This is a CHECKLIST — every item must pass or be flagged.

        SQL VALIDATION:
        1. DBT COMPILE: Use dbt_mcp.compile on each model to verify Jinja syntax,
           ref() resolution, and macro expansion — FAIL if compilation errors
        2. DBT PARSE: Use dbt_mcp.parse to validate schema.yml is well-formed
           and all column references resolve — FAIL if parse errors
        3. GRAIN: SELECT pk_columns, COUNT(*) HAVING COUNT(*) > 1
           — FAIL if duplicates on declared primary key
        4. ROW COUNT: Compare output rows vs source rows from profiling
           — WARN if >2x (fanout) or <50% (over-filtering)
        5. NULL PROPAGATION: Check PK and metric columns for nulls
           — WARN if PK has any nulls
        6. DATA PREVIEW: Use dbt_mcp.show to preview 5 rows of the final model
           output through dbt (not raw SQL) to verify it renders correctly

        ARTIFACT VALIDATION (check the generated content):
        7. SCHEMA.YML EXISTS: Every model has a schema.yml entry — FAIL if missing
        8. PK TESTS: Every model has unique + not_null on its primary key — FAIL if missing
        9. SOURCES.YML: New sources have a sources.yml entry with freshness — FAIL if missing
        10. REF/SOURCE USAGE: SQL uses {{ ref() }} and {{ source() }}, not hardcoded FQNs — FAIL if hardcoded
        11. EXPLICIT COLUMNS: No SELECT * in any model SQL — FAIL if found
        12. CONFIG BLOCK: Every model has {{ config() }} matching domain conventions — WARN if missing

        COVERAGE VALIDATION:
        13. MULTI-BRAND: If profiling found multi_brand_sources, they are unioned — WARN if not
        14. NAMING: Model names follow domain conventions — WARN if not
        15. DIRECTORY: File paths match domain directory structure — WARN if not
        16. LINEAGE: Use dbt_mcp.get_lineage to verify new models integrate
            correctly into the existing DAG dependency graph — WARN if orphaned

        For each check: report PASS, WARN, or FAIL with details.
      tools:
        - name: snowflake_mcp.execute_query
          instruction: "Run grain, row count, and null validation queries against Snowflake"
        - name: dbt_mcp.compile
          instruction: "Compile each model to verify Jinja syntax and ref() resolution"
        - name: dbt_mcp.parse
          instruction: "Parse project to validate schema.yml is well-formed"
        - name: dbt_mcp.show
          instruction: "Preview output rows through dbt to verify rendering"
        - name: dbt_mcp.test
          instruction: "Run the recommended tests to verify they pass on real data"
        - name: dbt_mcp.get_lineage
          instruction: "Verify new models integrate into existing lineage graph"
      context:
        static: []
        dynamic:
          - from: build_pipeline
          - from: profile_source_data
            select: [profiles, multi_brand_sources]
          - from: gather_reference_context
            select: domain_conventions
      output_schema:
        type: object
        required: [checks, overall_status, sample_output]
        properties:
          checks:
            type: array
            items:
              type: object
              required: [check_name, status, detail]
              properties:
                check_name:
                  type: string
                status:
                  type: string
                  enum: [pass, warn, fail]
                detail:
                  type: string
          overall_status:
            type: string
            enum: [all_pass, has_warnings, has_failures]
          sample_output:
            type: object
            properties:
              columns:
                type: array
              rows:
                type: array
              row_count:
                type: integer
      budget:
        max_llm_turns: 8
        max_tokens: 12000
      transitions:
        - default: show_results

    # ═══════════════════════════════════════════════════════════
    # PHASE 4: Delivery (approval gates + PR)
    # ═══════════════════════════════════════════════════════════

    # Step 7: Checkpoint — show everything to user
    - id: show_results
      mode: execute
      type: delegate
      delegate: shift.show_plan
      requires_approval: true
      context:
        dynamic:
          - from: build_pipeline
          - from: validate_output
          - from: profile_source_data
            select: [profiles, warnings]
          - from: gather_reference_context
            select: domain_conventions
      output_schema:
        type: object
        required: [user_decision]
        properties:
          user_decision:
            type: string
            enum: [approve, revise]
          revision_request:
            type: string
          revision_count:
            type: integer
      transitions:
        - when: "output.user_decision == 'revise'"
          goto: revise_pipeline
        - default: create_pr

    # Step 8: Revise based on user feedback (loops back to show_results)
    - id: revise_pipeline
      mode: reason
      instruction: |
        The user has requested changes to the generated pipeline.
        Read their revision_request and apply the changes.

        You have full context from build_pipeline and validate_output.
        Modify ONLY what the user asked for. Regenerate the affected
        model SQL, schema.yml, or sources.yml as needed.

        Output the complete updated artifacts (full file content, not diffs).
        Then re-validate: run the same checks from validate_output on the
        modified models.

        The driver tracks revision_count. After 3 rounds, the workflow
        proceeds to create_pr regardless, with a note that further changes
        can be made in the PR itself.
      tools:
        - name: snowflake_mcp.execute_query
          instruction: "Re-validate modified SQL"
        - name: github_cli.read_file
          instruction: "Re-read reference if needed"
      context:
        static: [naming_conventions, testing_standards]
        dynamic:
          - from: show_results
            select: [revision_request, revision_count]
          - from: build_pipeline
          - from: validate_output
          - from: gather_reference_context
            select: [reference_sql_files, domain_conventions]
      output_schema:
        type: object
        required: [updated_models, validation_checks]
        properties:
          updated_models:
            type: array
            items:
              type: object
              required: [name, sql_content, change_description]
          validation_checks:
            type: array
            items:
              type: object
              required: [check_name, status]
      budget:
        max_llm_turns: 8
        max_tokens: 15000
      transitions:
        - default: show_results

    # Step 9: Create PR
    - id: create_pr
      mode: execute
      type: delegate
      delegate: shift.create_pr
      requires_approval: true
      context:
        dynamic:
          - from: build_pipeline
          - from: validate_output
          - from: profile_source_data
            select: [profiles, warnings]

    # Step 10: Recommend orchestration
    - id: recommend_orchestration
      mode: reason
      instruction: |
        Provide orchestration guidance for the new pipeline.

        1. Query DBT_INVOCATIONS for the recommended DAG's recent runs
           to confirm it exists and runs on the expected schedule
        2. Verify the tags assigned to new models match the DAG's selector
        3. Identify downstream models that will auto-rebuild
        4. Recommend monitoring: watch first 3 runs in #ae-alerts
      tools:
        - name: snowflake_mcp.execute_query
          instruction: "Query DBT_INVOCATIONS and DBT_MODEL_TABLE_LINEAGE"
      context:
        static: []
        dynamic:
          - from: build_pipeline
            select: dag_recommendation
      output_schema:
        type: object
        required: [dag_name, schedule, selector_match, downstream_impact, monitoring_recommendation]
        properties:
          dag_name:
            type: string
          schedule:
            type: string
          selector_match:
            type: boolean
          tags:
            type: array
          downstream_impact:
            type: array
            items:
              type: object
              properties:
                model_name:
                  type: string
                relationship:
                  type: string
          monitoring_recommendation:
            type: string
      budget:
        max_llm_turns: 3
        max_tokens: 5000
