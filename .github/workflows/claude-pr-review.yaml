name: Claude PR Review
on:
  pull_request:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  pull-requests: write
  contents: write

jobs:
  handle-self-approval-bot:
    runs-on: sh-ubuntu-1x
    if: github.event_name == 'pull_request' && github.event.action == 'opened'
    outputs:
      is-self-approval-bot: ${{ steps.check-author.outputs.is-self-approval-bot }}
    steps:
      - name: Check if PR is from self-approval-bot
        id: check-author
        run: |
          echo "::group::Debug - Self-approval-bot check"
          echo "Event name: ${{ github.event_name }}"
          echo "Event action: ${{ github.event.action }}"
          echo "PR author: ${{ github.event.pull_request.user.login }}"
          echo "Checking if author equals 'self-approval-bot[bot]'"
          if [ "${{ github.event.pull_request.user.login }}" = "self-approval-bot[bot]" ]; then
            echo "✅ Match found - this is a self-approval-bot PR"
            echo "is-self-approval-bot=true" >> $GITHUB_OUTPUT
          else
            echo "❌ No match - this is NOT a self-approval-bot PR"
            echo "is-self-approval-bot=false" >> $GITHUB_OUTPUT
          fi
          echo "::endgroup::"

      - name: Comment on self-approval-bot PR
        if: steps.check-author.outputs.is-self-approval-bot == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `👋 Hi, Claude here! I noticed this PR was opened by the self-approval-bot.

            I can't automatically review self-approval PRs when they're first opened, but you can still request a review anytime by mentioning \`@claude\` or using \`/claude\` in a comment if you'd like me to take a look at the changes.

            Thanks! 🤖`
            })

  claude-review:
    runs-on: sh-ubuntu-2x
    needs: [handle-self-approval-bot]
    if: >
      always() &&
      (needs.handle-self-approval-bot.result == 'skipped' || needs.handle-self-approval-bot.outputs.is-self-approval-bot == 'false') &&
      (github.event_name == 'pull_request' ||
      ((github.event_name == 'issue_comment' && github.event.issue.pull_request) ||
       github.event_name == 'pull_request_review_comment') &&
      (contains(github.event.comment.body, '@claude') || contains(github.event.comment.body, '/claude')))
    steps:
      - name: Debug workflow conditions
        run: |
          echo "::group::Debug - Claude review conditions"
          echo "Event name: ${{ github.event_name }}"
          echo "Event action: ${{ github.event.action }}"
          echo "handle-self-approval-bot result: ${{ needs.handle-self-approval-bot.result }}"
          echo "is-self-approval-bot output: ${{ needs.handle-self-approval-bot.outputs.is-self-approval-bot }}"
          echo "Comment body (if applicable): ${{ github.event.comment.body }}"
          echo "PR author: ${{ github.event.pull_request.user.login }}"
          echo "::endgroup::"
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check for custom prompt
        id: check-prompt
        run: |
          if [ -f "CLAUDE_PR_PROMPT.md" ] || [ -f "claude_pr_prompt.md" ] || [ -f "Claude_PR_Prompt.md" ]; then
            echo "custom_prompt=true" >> $GITHUB_OUTPUT
          else
            echo "custom_prompt=false" >> $GITHUB_OUTPUT
          fi

      - name: Read custom prompt
        id: read-prompt
        if: steps.check-prompt.outputs.custom_prompt == 'true'
        run: |
          if [ -f "CLAUDE_PR_PROMPT.md" ]; then
            PROMPT_FILE="CLAUDE_PR_PROMPT.md"
          elif [ -f "claude_pr_prompt.md" ]; then
            PROMPT_FILE="claude_pr_prompt.md"
          elif [ -f "Claude_PR_Prompt.md" ]; then
            PROMPT_FILE="Claude_PR_Prompt.md"
          fi
          echo "prompt_content<<EOF" >> $GITHUB_OUTPUT
          cat "$PROMPT_FILE" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1.0.29
        with:
          use_sticky_comment: true
          track_progress: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
          anthropic_api_key: ${{ secrets.CLAUDE_API_KEY }}
          prompt: |
            ${{ steps.check-prompt.outputs.custom_prompt == 'true' && steps.read-prompt.outputs.prompt_content || 'You are a helpful AI code reviewer. Please review this pull request and provide constructive feedback.

            Focus on:
            - Code quality and best practices
            - Potential bugs or issues
            - Security concerns
            - Performance implications
            - Documentation and comments
            - Test coverage

            Be constructive and helpful in your feedback. If the code looks good, acknowledge that as well. For any issues you identify, suggest specific improvements or fixes.

            Please be concise but thorough in your review.' }}
          claude_args: |
            --allowedTools Read,Write,Grep,Glob,WebFetch
            --allowedTools Bash(ls),Bash(cat),Bash(head),Bash(tail),Bash(grep),Bash(find),Bash(wc),Bash(sort),Bash(uniq),Bash(diff),Bash(tree),Bash(file),Bash(stat),Bash(du),Bash(which),Bash(whoami),Bash(pwd),Bash(echo)
            --allowedTools Bash(npm test),Bash(npm run test),Bash(yarn test),Bash(yarn run test),Bash(pnpm test),Bash(pnpm run test)
            --allowedTools Bash(npx jest),Bash(npx mocha),Bash(npx vitest),Bash(npx playwright test),Bash(npx cypress run)
            --allowedTools Bash(dotnet test),Bash(dotnet build)
            --allowedTools Bash(python -m pytest),Bash(pytest),Bash(python -m unittest),Bash(python -m nose2),Bash(tox),Bash(poetry run pytest),Bash(pipenv run pytest)
            --system-prompt "Make sure you can complete your review in under 5 minutes. Call out any issues that you'd like to potentially investigate further but didn't have time to dig into, and that they should prompt you directly if they want you to investigate further. Remind the user in the very last line of your comment that they can customize this review prompt by adding a CLAUDE_PR_PROMPT.md, claude_pr_prompt.md, or Claude_PR_Prompt.md file to your repository root."
